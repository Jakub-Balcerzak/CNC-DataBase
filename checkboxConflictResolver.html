<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 16px;
      }
      h3 {
        color: #ff9800;
        margin-bottom: 8px;
      }
      .progress-indicator {
        color: #757575;
        font-size: 14px;
        margin-bottom: 16px;
      }
      .element-name {
        font-weight: bold;
        color: #1976d2;
        margin-bottom: 16px;
      }
      .options-section {
        margin-bottom: 24px;
      }
      .checkbox-option {
        padding: 12px;
        margin: 8px 0;
        border: 2px solid #e0e0e0;
        border-radius: 4px;
        background-color: #f5f5f5;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
      }
      .checkbox-option:hover {
        border-color: #ff9800;
        background-color: #fff3e0;
      }
      .checkbox-option.selected {
        border-color: #ff9800;
        background-color: #ffe0b2;
      }
      .option-number {
        font-weight: bold;
        color: #ff9800;
        margin-right: 12px;
        font-size: 18px;
      }
      .option-icon {
        font-size: 24px;
        margin-right: 8px;
      }
      .option-label {
        font-weight: 500;
        color: #424242;
      }
      .locations-section {
        margin-bottom: 24px;
      }
      .location-item {
        padding: 6px 12px;
        margin: 4px 0;
        border-radius: 2px;
        display: flex;
        align-items: center;
      }
      .location-item.checked {
        background-color: #e8f5e9;
        border-left: 4px solid #4caf50;
      }
      .location-item.unchecked {
        background-color: #ffebee;
        border-left: 4px solid #f44336;
      }
      .location-icon {
        margin-right: 8px;
        font-weight: bold;
      }
      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
        position: relative;
      }
      .btn-primary {
        background-color: #ff9800;
        color: white;
      }
      .btn-primary:hover:not(:disabled) {
        background-color: #f57c00;
      }
      .btn-primary:disabled {
        background-color: #bdbdbd;
        cursor: not-allowed;
      }
      .btn-primary.loading {
        background-color: #f57c00;
        cursor: wait;
      }
      .btn-secondary {
        background-color: #757575;
        color: white;
      }
      .btn-secondary:hover:not(:disabled) {
        background-color: #616161;
      }
      .btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .info-text {
        color: #616161;
        font-size: 14px;
        margin-top: 8px;
      }
      
      /* Loading spinner animation */
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .btn-text {
        display: inline-block;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <h3>☑️ Konflikt checkboxów UP-TO-DATE?</h3>
    
    <div class="progress-indicator">
      Konflikt <?= currentConflict ?> z <?= totalConflicts ?>
    </div>
    
    <div class="element-name">
      Element: <?= elementName ?>
    </div>

    <div class="options-section">
      <strong>Wybierz stan checkboxa:</strong>
      <div class="info-text">Wybrany stan zostanie zastosowany do wszystkich wystąpień</div>
      
      <div class="checkbox-option" onclick="selectOption(true)" id="option-true">
        <span class="option-number">1.</span>
        <span class="option-icon">✓</span>
        <span class="option-label">Zaznaczony (TRUE)</span>
      </div>
      
      <div class="checkbox-option" onclick="selectOption(false)" id="option-false">
        <span class="option-number">2.</span>
        <span class="option-icon">☐</span>
        <span class="option-label">Odznaczony (FALSE)</span>
      </div>
    </div>

    <div class="locations-section">
      <strong>Wystąpienia elementu:</strong>
      <? locations.forEach(loc => { ?>
        <div class="location-item <?= loc.checked ? 'checked' : 'unchecked' ?>">
          <span class="location-icon"><?= loc.checked ? '✓' : '☐' ?></span>
          <?= loc.sheet ?>!<?= loc.column ?><?= loc.row ?> (<?= loc.checked ? 'zaznaczony' : 'odznaczony' ?>)
        </div>
      <? }); ?>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="okBtn" onclick="submitChoice()" disabled>
        <span class="btn-text">OK</span>
      </button>
      <button class="btn btn-secondary" id="cancelBtn" onclick="cancel()">
        Pomiń
      </button>
    </div>

    <script>
      let selectedState = null;
      let isSubmitting = false;

      function selectOption(state) {
        if (isSubmitting) return;
        
        selectedState = state;
        
        // Usuń zaznaczenie z wszystkich
        document.querySelectorAll('.checkbox-option').forEach(el => {
          el.classList.remove('selected');
        });
        
        // Zaznacz wybrany
        document.getElementById('option-' + state).classList.add('selected');
        
        // Włącz przycisk OK
        document.getElementById('okBtn').disabled = false;
      }

      function submitChoice() {
        if (selectedState === null) {
          alert('Wybierz stan checkboxa przed zatwierdzeniem.');
          return;
        }
        
        if (isSubmitting) return;
        
        isSubmitting = true;
        
        // Zablokuj oba przyciski
        const okBtn = document.getElementById('okBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        okBtn.disabled = true;
        cancelBtn.disabled = true;
        
        // Dodaj spinner i zmień tekst
        okBtn.classList.add('loading');
        okBtn.innerHTML = '<span class="spinner"></span><span class="btn-text">Zapisywanie...</span>';
        
        // Zablokuj wybór opcji
        document.querySelectorAll('.checkbox-option').forEach(el => {
          el.style.pointerEvents = 'none';
          el.style.opacity = '0.6';
        });
        
        // Wyślij wybraną wartość do Apps Script
        google.script.run
          .withSuccessHandler(() => {
            google.script.host.close();
          })
          .withFailureHandler((error) => {
            // W przypadku błędu przywróć stan przycisków
            isSubmitting = false;
            okBtn.disabled = false;
            cancelBtn.disabled = false;
            okBtn.classList.remove('loading');
            okBtn.innerHTML = '<span class="btn-text">OK</span>';
            
            // Przywróć możliwość wyboru
            document.querySelectorAll('.checkbox-option').forEach(el => {
              el.style.pointerEvents = '';
              el.style.opacity = '';
            });
            
            alert('Błąd: ' + error.message);
          })
          .resolveCheckboxConflict('<?= elementName ?>', selectedState);
      }

      function cancel() {
        if (isSubmitting) return;
        google.script.host.close();
      }

      // Obsługa klawiatury
      document.addEventListener('keydown', (event) => {
        if (isSubmitting) return;
        
        if (event.key === '1') {
          selectOption(true);
        } else if (event.key === '2') {
          selectOption(false);
        } else if (event.key === 'Enter' && selectedState !== null) {
          submitChoice();
        } else if (event.key === 'Escape') {
          cancel();
        }
      });
    </script>
  </body>
</html>
